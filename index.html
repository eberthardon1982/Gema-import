<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GEMA Honduras Import">
<meta name="theme-color" content="#0f172a">
<title>GEMA Honduras Import</title>
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#0f172a;overflow-x:hidden;-webkit-text-size-adjust:100%}
#root{min-height:100vh}
input,select,textarea{font-size:16px!important}
select{-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
button{-webkit-user-select:none;user-select:none;touch-action:manipulation}
.safe-bottom{padding-bottom:env(safe-area-inset-bottom,0px)}
@keyframes spin{to{transform:rotate(360deg)}}
#L{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.sp{width:44px;height:44px;border:3px solid #1e3a5f;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite}
#pb{width:240px;height:4px;background:#1e293b;border-radius:2px;overflow:hidden}
#pf{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);border-radius:2px;width:0%;transition:width 0.5s}
#st{color:#3b82f6;font-size:13px;font-weight:700}
#ss{color:#475569;font-size:11px;text-align:center;max-width:270px;line-height:1.5}
</style>
</head>
<body>
<div id="root"></div>
<div id="L">
<div class="sp"></div>
<div id="pb"><div id="pf"></div></div>
<div id="st">GEMA Honduras Import</div>
<div id="ss">Iniciando...</div>
</div>
<script>
const VER='7.0', CK='gema7';
const $=id=>document.getElementById(id);
const p=(m,s,v)=>{
  $('st')&&($('st').textContent=m);
  $('ss')&&($('ss').textContent=s||'');
  v!==undefined&&$('pf')&&($('pf').style.width=v+'%');
};
const hide=()=>{
  const l=$('L');
  if(l){l.style.opacity='0';l.style.transition='opacity 0.3s';setTimeout(()=>l.remove(),350);}
};
const showErr=(m,d)=>{
  const l=$('L');
  if(!l)return;
  l.innerHTML='<div style="text-align:center;padding:24px;max-width:300px">'+
    '<div style="font-size:32px;margin-bottom:10px">⚠️</div>'+
    '<p style="color:#f87171;font-size:15px;font-weight:700;margin:0 0 8px">'+m+'</p>'+
    '<p style="color:#64748b;font-size:12px;margin:0 0 16px;line-height:1.5">'+d+'</p>'+
    '<button onclick="localStorage.removeItem(\''+CK+'\');location.reload()" '+
    'style="background:#3b82f6;color:white;border:none;padding:12px 24px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600">'+
    'Reintentar</button>'+
    '<p style="color:#334155;font-size:11px;margin-top:10px">💡 La primera carga requiere WiFi bueno o computadora</p></div>';
};

const ld=(src,ok,fail)=>{
  const s=document.createElement('script');
  s.src=src;
  s.onload=ok;
  s.onerror=fail||(()=>showErr('Sin conexión','No cargó: '+src.split('/').pop()+'. Verificá WiFi.'));
  document.head.appendChild(s);
};

const mount=code=>{
  try{
    const wrapped=code+'\nwindow.__GEMA_APP__=App;';
    new Function(wrapped)();
    if(typeof window.__GEMA_APP__!=='undefined'){
      ReactDOM.createRoot($('root')).render(React.createElement(window.__GEMA_APP__));
      hide();
    }else showErr('Error al iniciar','La función App no se encontró');
  }catch(e){
    localStorage.removeItem(CK);
    showErr('Error al iniciar',e.message.substring(0,100));
  }
};

// Check cache first
const cached=localStorage.getItem(CK);
if(cached){
  p('Cargando app ⚡','Versión guardada — carga instantánea',25);
}else{
  p('Descargando dependencias...','Solo la primera vez — conectate a WiFi bueno',5);
}

// Load React first (always needed)
ld('https://unpkg.com/react@18/umd/react.production.min.js',()=>{
  ld('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',()=>{
    ld('https://cdn.tailwindcss.com',()=>{
      
      if(cached){
        p('Iniciando...','',95);
        setTimeout(()=>mount(cached),100);
        return;
      }
      
      // Fetch app code
      p('Descargando app...','',50);
      fetch('app.js?v='+VER)
        .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
        .then(src=>{
          p('Compilando con Web Worker...','Esto puede tardar unos minutos. Dejá el teléfono conectado al WiFi ☕',65);
          
          // Try Web Worker approach first (non-blocking)
          if(typeof Worker!=='undefined'){
            try{
              const workerCode=`
                importScripts('https://unpkg.com/@babel/standalone@7.23.5/babel.min.js');
                self.onmessage=function(e){
                  try{
                    const r=Babel.transform(e.data,{presets:['react'],sourceType:'script'});
                    self.postMessage({ok:true,code:r.code});
                  }catch(err){
                    self.postMessage({ok:false,error:err.message});
                  }
                };
              `;
              const blob=new Blob([workerCode],{type:'application/javascript'});
              const worker=new Worker(URL.createObjectURL(blob));
              
              // Timeout after 5 minutes
              const timeout=setTimeout(()=>{
                worker.terminate();
                showErr('Tiempo excedido','La compilación tardó más de 5 minutos. Intentá desde una computadora.');
              }, 300000);
              
              worker.onmessage=function(e){
                clearTimeout(timeout);
                if(e.data.ok){
                  try{localStorage.setItem(CK,e.data.code);}catch(ex){}
                  p('¡Listo! 🎉','',100);
                  setTimeout(()=>mount(e.data.code),200);
                }else{
                  showErr('Error de compilación',e.data.error.substring(0,100));
                }
              };
              
              worker.onerror=function(e){
                clearTimeout(timeout);
                worker.terminate();
                // Fallback to main thread
                compilarEnMainThread(src);
              };
              
              worker.postMessage(src);
              
            }catch(ex){
              compilarEnMainThread(src);
            }
          }else{
            compilarEnMainThread(src);
          }
        })
        .catch(()=>showErr('Error de red','No se pudo descargar app.js'));
      
    });
  });
});

function compilarEnMainThread(src){
  p('Compilando...','Esto puede tardar varios minutos en el teléfono ☕',70);
  ld('https://unpkg.com/@babel/standalone@7.23.5/babel.min.js',()=>{
    setTimeout(()=>{
      try{
        const out=Babel.transform(src,{presets:['react'],sourceType:'script'}).code;
        try{localStorage.setItem(CK,out);}catch(e){}
        p('¡Listo! 🎉','',100);
        setTimeout(()=>mount(out),200);
      }catch(e){
        showErr('Error de compilación',e.message.substring(0,100));
      }
    },100);
  });
}
</script>
</body>
</html>
